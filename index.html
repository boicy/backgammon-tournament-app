<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backgammon Tournament Tracker</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-has-tournament="false">
  <header class="app-header">
    <h1 class="app-title">Backgammon</h1>
    <nav class="app-tabs" aria-label="Main navigation">
      <a href="#/live" class="nav-link" aria-label="Live matches">Live</a>
      <a href="#/leaderboard" class="nav-link" aria-label="Standings">Standings</a>
    </nav>
    <div class="hamburger-menu-wrapper">
      <button class="hamburger-btn" id="hamburger-btn" aria-label="Open menu" aria-expanded="false">☰</button>
      <div class="hamburger-menu" id="hamburger-menu" role="menu">
        <a href="#/live" class="menu-item" role="menuitem">Live</a>
        <a href="#/leaderboard" class="menu-item" role="menuitem">Standings</a>
        <div class="hamburger-menu-divider"></div>
        <a href="#/history" class="menu-item" role="menuitem">History</a>
        <a href="#/club" class="menu-item" role="menuitem">Club</a>
        <div class="hamburger-menu-divider" id="menu-divider-tournament"></div>
        <button class="menu-item menu-item-danger" id="menu-end-tournament" data-action="end-tournament" role="menuitem">End Tournament</button>
        <button class="menu-item menu-item-danger" id="menu-reset-tournament" data-action="reset-tournament" role="menuitem">Reset Tournament</button>
      </div>
    </div>
  </header>
  <main id="app" role="main">
    <!-- Views render here -->
  </main>
  <script type="module" src="src/main.js"></script>
</body>
</html>
